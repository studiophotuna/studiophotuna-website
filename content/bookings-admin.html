      <div class="px-6 py-12 max-w-7xl mx-auto space-y-8">
        <div class="border-b border-line pb-4 flex flex-col md:flex-row items-start md:items-end justify-between gap-4">
          <div>
            <h1 class="h1-display text-[#111827] text-4xl sm:text-5xl mt-2">Admin Dashboard</h1>
            <p class="text-sm text-body" id="adminMeta">Logged in as admin...</p>
          </div>
          <div class="flex gap-2">
            <button class="btn-animation border border-line bg-white hover:bg-grey px-4 py-2.5 rounded-full text-xs font-extrabold text-title flex items-center gap-1" type="button" id="refreshBookings">
              <i class="fa-solid fa-arrows-rotate text-purple"></i> Refresh
            </button>
          </div>
        </div>

        <!-- Metrics Cards Grid -->
        <div class="stats grid grid-cols-2 md:grid-cols-6 gap-4">
          <div class="stat-card border border-line rounded-2xl bg-white p-4 shadow-sm flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-yellow-100 text-yellow-800 flex items-center justify-center text-sm shrink-0"><i class="fa-solid fa-hourglass-half"></i></div>
            <div class="min-w-0"><small class="text-[10px] uppercase font-black tracking-widest text-muted block mb-0.5">Pending</small><strong class="text-2xl font-black text-title" id="statPending">0</strong></div>
          </div>
          <div class="stat-card border border-line rounded-2xl bg-white p-4 shadow-sm flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-green-100 text-green-700 flex items-center justify-center text-sm shrink-0"><i class="fa-solid fa-circle-check"></i></div>
            <div class="min-w-0"><small class="text-[10px] uppercase font-black tracking-widest text-muted block mb-0.5">Approved</small><strong class="text-2xl font-black text-title" id="statApproved">0</strong></div>
          </div>
          <div class="stat-card border border-line rounded-2xl bg-white p-4 shadow-sm flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-blue-100 text-blue-700 flex items-center justify-center text-sm shrink-0"><i class="fa-solid fa-money-bill-wave"></i></div>
            <div class="min-w-0"><small class="text-[10px] uppercase font-black tracking-widest text-muted block mb-0.5">50% Paid</small><strong class="text-2xl font-black text-title" id="statPaid">0</strong></div>
          </div>
          <div class="stat-card border border-line rounded-2xl bg-white p-4 shadow-sm flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-purple/10 text-purple flex items-center justify-center text-sm shrink-0"><i class="fa-solid fa-calendar-check"></i></div>
            <div class="min-w-0"><small class="text-[10px] uppercase font-black tracking-widest text-muted block mb-0.5">Total Bookings</small><strong class="text-2xl font-black text-title" id="statTotal">0</strong></div>
          </div>
          <div class="stat-card border border-line rounded-2xl bg-white p-4 shadow-sm flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-orange-100 text-orange-600 flex items-center justify-center text-sm shrink-0"><i class="fa-solid fa-receipt"></i></div>
            <div class="min-w-0"><small class="text-[10px] uppercase font-black tracking-widest text-muted block mb-0.5">Pending Proofs</small><strong class="text-2xl font-black text-orange-500" id="statProofsPending">0</strong></div>
          </div>
          <div class="stat-card border border-line rounded-2xl bg-white p-4 shadow-sm flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-purple/10 text-purple flex items-center justify-center text-sm shrink-0"><i class="fa-solid fa-envelope"></i></div>
            <div class="min-w-0"><small class="text-[10px] uppercase font-black tracking-widest text-muted block mb-0.5">Custom Quotes</small><strong class="text-2xl font-black text-purple" id="statCustomQuotes">0</strong></div>
          </div>
        </div>

        <!-- Toolbar -->
        <div class="bg-white border border-line rounded-3xl p-6 shadow-sm space-y-5">
          <div class="flex flex-col gap-4 border-b border-line pb-4">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
              <h2 class="text-xl font-extrabold text-title" id="adminPanelTitle">Bookings</h2>
              <!-- Section groups -->
              <div class="admin-group-tabs inline-flex flex-wrap gap-1.5 bg-grey p-1.5 rounded-2xl border border-line">
                <button type="button" class="active bg-white px-4 py-2 rounded-full text-xs font-black text-purple shadow-sm" data-admin-group="bookings"><i class="fa-solid fa-calendar-check mr-1.5"></i>Bookings</button>
                <button type="button" class="px-4 py-2 rounded-full text-xs font-black text-body" data-admin-group="support">
                  <i class="fa-solid fa-headset mr-1.5"></i>Support <span id="supportGroupBadge" class="hidden ml-1 bg-red-500 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full">0</span>
                </button>
                <button type="button" class="px-4 py-2 rounded-full text-xs font-black text-body" data-admin-group="reviews"><i class="fa-solid fa-star mr-1.5"></i>Reviews</button>
                <button type="button" class="px-4 py-2 rounded-full text-xs font-black text-body" data-admin-group="analytics"><i class="fa-solid fa-chart-line mr-1.5"></i>Analytics</button>
              </div>
            </div>
            <!-- Topic sub-tabs (only shown for groups with more than one topic) -->
            <div id="adminSubtabsRow" class="flex flex-wrap gap-1.5">

              <button type="button" class="admin-tab border border-line bg-white text-body px-3.5 py-1.5 rounded-full text-[11px] font-bold" data-admin-tab="packages" data-admin-group="bookings">

              </button>
              <button type="button" class="admin-tab hidden border border-line bg-white text-body px-3.5 py-1.5 rounded-full text-[11px] font-bold" data-admin-tab="proofs" data-admin-group="support">
                Payment Proofs <span id="proofsTabBadge" class="hidden ml-1 bg-orange-500 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full">0</span>
              </button>
              <button type="button" class="admin-tab hidden border border-line bg-white text-body px-3.5 py-1.5 rounded-full text-[11px] font-bold" data-admin-tab="tickets" data-admin-group="support">
                Support Tickets <span id="ticketsTabBadge" class="hidden ml-1 bg-red-500 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full">0</span>
              </button>
              <button type="button" class="admin-tab hidden border border-line bg-white text-body px-3.5 py-1.5 rounded-full text-[11px] font-bold" data-admin-tab="inbox" data-admin-group="support">
                Inbox <span id="inboxTabBadge" class="hidden ml-1 bg-red-500 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full">0</span>
              </button>
              <button type="button" class="admin-tab hidden border border-line bg-white text-body px-3.5 py-1.5 rounded-full text-[11px] font-bold" data-admin-tab="reviews" data-admin-group="reviews">Reviews</button>
              <button type="button" class="admin-tab hidden border border-line bg-white text-body px-3.5 py-1.5 rounded-full text-[11px] font-bold" data-admin-tab="analytics" data-admin-group="analytics">Analytics</button>
            </div>
          </div>

          <!-- Booking sub-toolbar: search + filters (hidden on other tabs) -->
          <div id="bookingSubToolbar" class="flex flex-col sm:flex-row gap-3">
            <input id="bookingSearch" type="text" placeholder="Search by name, email, event type…" class="flex-1 border border-line rounded-xl px-4 py-2.5 text-xs focus:border-purple outline-none" oninput="renderBookings()" />
            <div class="filters flex flex-wrap gap-1.5">
              <button type="button" class="active border border-line rounded-full bg-white text-title px-4 py-2 text-xs font-bold" data-filter="all">All</button>
              <button type="button" class="border border-line rounded-full bg-white text-title px-4 py-2 text-xs font-bold" data-filter="pending">Pending</button>
              <button type="button" class="border border-line rounded-full bg-white text-title px-4 py-2 text-xs font-bold" data-filter="approved">Approved</button>
              <button type="button" class="border border-line rounded-full bg-white text-title px-4 py-2 text-xs font-bold" data-filter="declined">Declined</button>
              <button type="button" class="border border-line rounded-full bg-white text-title px-4 py-2 text-xs font-bold" data-filter="cancelled">Cancelled</button>
              <button type="button" class="border border-purple/40 rounded-full bg-purple/5 text-purple px-4 py-2 text-xs font-bold" data-filter="custom_quote">Custom Quotes</button>
            </div>
          </div>

          <!-- Proofs sub-toolbar -->
          <div id="proofsSubToolbar" class="hidden flex-wrap gap-1.5">
            <button type="button" class="active border border-line rounded-full bg-white text-title px-4 py-2 text-xs font-bold" data-proof-filter="all">All</button>
            <button type="button" class="border border-line rounded-full bg-white text-title px-4 py-2 text-xs font-bold" data-proof-filter="pending">Pending</button>
            <button type="button" class="border border-line rounded-full bg-white text-title px-4 py-2 text-xs font-bold" data-proof-filter="approved">Approved</button>
            <button type="button" class="border border-line rounded-full bg-white text-title px-4 py-2 text-xs font-bold" data-proof-filter="rejected">Rejected</button>
          </div>

          <!-- Inbox sub-toolbar: filter by which mailbox received it -->
          <div id="inboxSubToolbar" class="hidden flex-wrap gap-1.5">
            <button type="button" class="active ring-2 ring-offset-1 ring-purple border border-line rounded-full bg-white text-title px-4 py-2 text-xs font-bold" data-inbox-filter="all">All</button>
            <button type="button" class="border border-line rounded-full bg-white text-title px-4 py-2 text-xs font-bold" data-inbox-filter="support@studiophotuna.com">Support</button>
            <button type="button" class="border border-red-200 rounded-full bg-red-50 text-red-700 px-4 py-2 text-xs font-bold" data-inbox-filter="dpo@studiophotuna.com">DPO Requests</button>
            <button type="button" class="border border-purple/40 rounded-full bg-purple/5 text-purple px-4 py-2 text-xs font-bold" data-inbox-filter="notification@studiophotuna.com">Notification</button>
          </div>

          <div class="message text-center text-xs font-bold" id="adminMessage"></div>
        </div>

        <!-- Content lists -->
        <div class="booking-list grid grid-cols-1 gap-5" id="bookingList"></div>
        <div class="grid grid-cols-1 gap-5 hidden" id="proofList"></div>
        <div class="grid grid-cols-1 gap-5 hidden" id="ticketList"></div>
        <div class="grid grid-cols-1 gap-5 hidden" id="packagesList"></div>
        <div class="booking-list grid grid-cols-1 gap-5 hidden" id="reviewList"></div>
        <div class="grid grid-cols-1 gap-5 hidden" id="inboxList"></div>
        <div class="hidden" id="analyticsPanel"></div>
      </div>
